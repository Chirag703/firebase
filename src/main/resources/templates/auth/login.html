<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In - Firebase Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); overflow: hidden; max-width: 420px; width: 100%; }
        .auth-header { background: linear-gradient(135deg, #f57c00, #ff6d00); padding: 2rem; text-align: center; }
        .auth-header .logo-icon { font-size: 3rem; color: #fff; }
        .auth-header h1 { color: #fff; font-size: 1.5rem; margin: 0.5rem 0 0; font-weight: 700; letter-spacing: 1px; }
        .auth-header p { color: rgba(255,255,255,0.85); font-size: 0.9rem; margin: 0; }
        .auth-body { padding: 2rem; }
        .btn-firebase { background: linear-gradient(135deg, #f57c00, #ff6d00); border: none; color: #fff; font-weight: 600; padding: 0.65rem 1.5rem; border-radius: 6px; width: 100%; }
        .btn-firebase:hover { background: linear-gradient(135deg, #e65100, #f57c00); color: #fff; }
        .form-control:focus { border-color: #f57c00; box-shadow: 0 0 0 0.2rem rgba(245,124,0,0.25); }
        .divider { text-align: center; margin: 1rem 0; color: #888; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-card mx-auto">
        <div class="auth-header">
            <div class="logo-icon"><i class="bi bi-fire"></i></div>
            <h1>Firebase Console</h1>
            <p>Sign in to your account</p>
        </div>
        <div class="auth-body">
            <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${logoutMsg}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${logoutMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <span th:text="${success}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form method="post" th:action="@{/auth/login}">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}"/>
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="username" name="username"
                               placeholder="you@example.com" required autocomplete="email"/>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Enter your password" required autocomplete="current-password"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-firebase">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <div class="divider">— or —</div>
            <p class="text-center mb-0">
                Don't have an account?
                <a th:href="@{/auth/register}" class="text-decoration-none" style="color:#f57c00; font-weight:600;">
                    Create Account
                </a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
