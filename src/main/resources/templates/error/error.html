<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${errorCode + ' - ' + errorTitle + ' - Firebase Console'}">Error</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="/css/bootstrap-icons.css"/>
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: #fff; border-radius: 16px; max-width: 480px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.4); overflow: hidden; }
        .error-header { background: linear-gradient(135deg, #c62828, #e53935); padding: 2rem; text-align: center; }
        .error-code { font-size: 5rem; font-weight: 900; color: rgba(255,255,255,0.3); line-height: 1; margin-bottom: 0.5rem; }
        .error-title { color: #fff; font-size: 1.4rem; font-weight: 700; }
    </style>
</head>
<body>
<div class="container px-3">
    <div class="error-card mx-auto">
        <div class="error-header">
            <div class="error-code" th:text="${errorCode ?: '500'}">500</div>
            <div class="error-title" th:text="${errorTitle ?: 'Internal Server Error'}">Error</div>
        </div>
        <div class="p-4 text-center">
            <p class="text-muted mb-4" th:text="${errorMessage ?: 'Something went wrong. Please try again.'}">Error message</p>
            <div class="d-flex gap-2 justify-content-center">
                <a href="/dashboard" class="btn" style="background:#f57c00;color:#fff;font-weight:600;">
                    <i class="bi bi-house me-2"></i>Go to Dashboard
                </a>
                <button onclick="history.back()" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-2"></i>Go Back
                </button>
            </div>
        </div>
    </div>
</div>
<script src="/js/bootstrap.bundle.min.js"></script>
</body>
</html>
