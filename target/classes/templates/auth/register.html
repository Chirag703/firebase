<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Account - Firebase Console</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
        .auth-card { background: #fff; border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); overflow: hidden; max-width: 440px; width: 100%; }
        .auth-header { background: linear-gradient(135deg, #f57c00, #ff6d00); padding: 1.75rem; text-align: center; }
        .auth-header .logo-icon { font-size: 2.5rem; color: #fff; }
        .auth-header h1 { color: #fff; font-size: 1.4rem; margin: 0.4rem 0 0; font-weight: 700; letter-spacing: 1px; }
        .auth-header p { color: rgba(255,255,255,0.85); font-size: 0.88rem; margin: 0; }
        .auth-body { padding: 2rem; }
        .btn-firebase { background: linear-gradient(135deg, #f57c00, #ff6d00); border: none; color: #fff; font-weight: 600; padding: 0.65rem 1.5rem; border-radius: 6px; width: 100%; }
        .btn-firebase:hover { background: linear-gradient(135deg, #e65100, #f57c00); color: #fff; }
        .form-control:focus { border-color: #f57c00; box-shadow: 0 0 0 0.2rem rgba(245,124,0,0.25); }
        .divider { text-align: center; margin: 1rem 0; color: #888; font-size: 0.85rem; }
        .password-strength { height: 4px; border-radius: 2px; transition: all 0.3s; }
    </style>
</head>
<body>
<div class="container">
    <div class="auth-card mx-auto">
        <div class="auth-header">
            <div class="logo-icon"><i class="bi bi-fire"></i></div>
            <h1>Firebase Console</h1>
            <p>Create your account</p>
        </div>
        <div class="auth-body">
            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form method="post" th:action="@{/auth/register}">
                <input type="hidden" name="_csrf" th:value="${_csrf?.token}"/>
                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="name" name="name"
                               placeholder="John Doe" required minlength="2"/>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-semibold">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control" id="email" name="email"
                               placeholder="you@example.com" required autocomplete="email"/>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Minimum 8 characters" required minlength="8"
                               autocomplete="new-password" oninput="checkStrength(this.value)"/>
                    </div>
                    <div class="mt-1">
                        <div id="strengthBar" class="password-strength bg-secondary" style="width:0%"></div>
                    </div>
                    <small id="strengthText" class="text-muted"></small>
                </div>
                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" class="form-control" id="confirmPassword" name="confirmPassword"
                               placeholder="Repeat your password" required autocomplete="new-password"/>
                    </div>
                </div>
                <button type="submit" class="btn btn-firebase">
                    <i class="bi bi-person-plus me-2"></i>Create Account
                </button>
            </form>

            <div class="divider">— or —</div>
            <p class="text-center mb-0">
                Already have an account?
                <a th:href="@{/auth/login}" class="text-decoration-none" style="color:#f57c00; font-weight:600;">
                    Sign In
                </a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function checkStrength(val) {
    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');
    let strength = 0;
    if (val.length >= 8) strength++;
    if (/[A-Z]/.test(val)) strength++;
    if (/[0-9]/.test(val)) strength++;
    if (/[^A-Za-z0-9]/.test(val)) strength++;
    const widths = ['0%', '25%', '50%', '75%', '100%'];
    const colors = ['bg-secondary', 'bg-danger', 'bg-warning', 'bg-info', 'bg-success'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    bar.style.width = widths[strength];
    bar.className = 'password-strength ' + colors[strength];
    text.textContent = labels[strength];
}
</script>
</body>
</html>
